[env:lilygo_2CAN_330]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32s3_flash_16MB
monitor_speed = 115200
monitor_filters = default, time, log2file, esp32_exception_decoder
board_build.arduino.partitions = default_16MB.csv
; The 2CAN's PSRAM is opi, but we set it to qspi, to give us back the use of
; GPIO35-37. Unfortunately it will fail to init (opi PSRAM doesn't work in qspi
; mode), but we're not using it anyway.
board_build.arduino.memory_type = qio_qspi
framework = arduino
; Flash-size ESP-IDF overrides (pioarduino hybrid mode).
;custom_sdkconfig = file://sdkconfig.be_size.defaults
;    CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
build_flags = 
    -I include
    -Wimplicit-fallthrough
    -Wextra
    -Wall
    -D HW_LILYGO2CAN
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1 ;1 is to use the USB port as a serial port
    -D ARDUINO_RUNNING_CORE=1       ; Arduino Runs On Core (setup, loop)
    -D ARDUINO_EVENT_RUNNING_CORE=1 ; Events Run On Core
    -fno-exceptions -ffunction-sections -fdata-sections -Wl,--gc-sections
;build_cxxflags = -fno-rtti
lib_deps = 

[env:BECom_330]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32s3_flash_16MB
monitor_speed = 115200
upload_speed = 921600
monitor_filters = default, time, log2file, esp32_exception_decoder
board_build.arduino.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
framework = arduino
build_flags = 
    -I include
    -Wimplicit-fallthrough
    -Wextra
    -Wall
    -D HW_BECOM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1 ;1 is to use the USB port as a serial port
    -D ARDUINO_RUNNING_CORE=1       ; Arduino Runs On Core (setup, loop)
    -D ARDUINO_EVENT_RUNNING_CORE=1 ; Events Run On Core
    -fno-exceptions -ffunction-sections -fdata-sections -Wl,--gc-sections
;build_cxxflags = -fno-rtti
lib_deps =

[env:waveshare_330]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32s3_flash_16MB
monitor_speed = 115200
upload_speed = 921600
monitor_filters = default, time, log2file, esp32_exception_decoder

board_build.arduino.partitions = default_16MB.csv

; Waveshare ESP32-S3-RS485-CAN:
; ESP32-S3R8 = 8MB Octal/OPI PSRAM, board has 16MB Flash.
; RS485_DE_PIN is intentionally not defined as a build flag here.
; The HAL exposes GPIO21 and comm_rs485.cpp configures UART2 in RS485 half-duplex mode.
board_build.arduino.memory_type = qio_opi

framework = arduino

build_flags =
    -I include
    -Wimplicit-fallthrough
    -Wextra
    -Wall
    -DHW_WAVESHARE
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -fno-exceptions
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
;build_cxxflags = -fno-rtti
lib_deps =

