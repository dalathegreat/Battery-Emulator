# This GithHub Action runs the pre-commit defined in the .pre-commit-config.yaml file

name: 📝 Run pre-commit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1
