name: 🔋 Compile Common Images

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      release_version:
        description: "Release version in the format v1.2.3"
        required: true
        type: string

permissions:
  contents: read

# This is the list of jobs that will be run concurrently.
jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - board_name: "Lilygo T-CAN485"
            pio_env: "lilygo_330"
          - board_name: "Stark CMR"
            pio_env: "stark_330"
          - board_name: "Lilygo T-2CAN"
            pio_env: "lilygo_2CAN_330"
          - board_name: "ESP32 DevKit V1"
            pio_env: "esp32devkit_330"
          - board_name: "BECom ES32S3"
            pio_env: "BECom_330"
          - board_name: "Waveshare ESP32S3RS485CAN"
            pio_env: "waveshare_330"
          - board_name: "Compiler warning check"
            pio_env: "compiler_warning_check"

    steps:
    - uses: actions/checkout@v7
      name: Checkout code

    - name: Get platformio.ini hash
      id: platformio_ini_hash
      run: |
        PLATFORMIO_INI_HASH=$(md5sum platformio.ini | awk '{ print $1 }')
        echo "platformio_ini_hash=$PLATFORMIO_INI_HASH" >> $GITHUB_OUTPUT

    # Broader cache (just the download files)
    - uses: actions/cache@v6
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio

    # Tighter cache (of platformio itself)
    - uses: actions/cache@v6
      with:
        path: |
          ~/.cache/pip
          ~/.platformio
        key: ${{ runner.os }}-pio-${{ steps.platformio_ini_hash.outputs.platformio_ini_hash }}

    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install PlatformIO Core
      run: pip install --upgrade platformio

    - name: Build image for ${{ matrix.board_name }}
      run: pio run -e ${{ matrix.pio_env }}

    - name: Capture size report for ${{ matrix.board_name }}
      if: matrix.pio_env != 'compiler_warning_check'
      run: |
        pio run -e ${{ matrix.pio_env }} -t checkprogsize 2>&1 | tee checkprogsize.txt
        cat checkprogsize.txt | python .github/scripts/parse_size.py \
          --pio-env "${{ matrix.pio_env }}" \
          --board-name "${{ matrix.board_name }}" \
          --sha "${{ github.event.pull_request.head.sha || github.sha }}" \
          --pio-system-info "$(pio system info --json-output)" \
          --platform-json "$(cat "$HOME"/.platformio/platforms/espressif32*/platform.json)"

    - name: Compute artifact prefix
      id: name
      if: matrix.pio_env != 'compiler_warning_check'
      uses: actions/github-script@v9
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
        BOARD_NAME: ${{ matrix.board_name }}
      with:
        script: |
          const releaseVersion = process.env.RELEASE_VERSION || '';
          const board = process.env.BOARD_NAME.replace(/\s+/g, '');

          const sanitize = (s) => s.replace(/[":<>|*?\\/\r\n]/g, '-');

          let context_seg;
          if (releaseVersion) {
            context_seg = releaseVersion;
          } else if (context.eventName === 'pull_request') {
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            context_seg = `pr${context.payload.pull_request.number}-${sha}`;
          } else { // push
            const sha = context.sha.slice(0, 7);
            context_seg = `${sanitize(process.env.GITHUB_REF_NAME)}-${sha}`;
          }

          core.setOutput('prefix', `BE_${context_seg}_${board}`);

    - name: Rename release artifacts for ${{ matrix.board_name }}
      if: matrix.pio_env != 'compiler_warning_check'
      env:
        PREFIX: ${{ steps.name.outputs.prefix }}
        PIO_ENV: ${{ matrix.pio_env }}
      run: |
        mv "${PIO_ENV}.size.json"                       "${PREFIX}.size.json"
        mv ".pio/build/${PIO_ENV}/firmware.factory.bin" "${PREFIX}.factory.bin"
        mv ".pio/build/${PIO_ENV}/firmware.bin"         "${PREFIX}.ota.bin"

    - name: Upload factory image for ${{ matrix.board_name }}
      if: matrix.pio_env != 'compiler_warning_check'
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.name.outputs.prefix }}.factory.bin
        archive: false
        if-no-files-found: error

    - name: Upload OTA image for ${{ matrix.board_name }}
      if: matrix.pio_env != 'compiler_warning_check'
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.name.outputs.prefix }}.ota.bin
        archive: false
        if-no-files-found: error

    - name: Upload size report for ${{ matrix.board_name }}
      if: matrix.pio_env != 'compiler_warning_check'
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.name.outputs.prefix }}.size.json
        archive: false
        if-no-files-found: error

  measure-size:
    needs: build
    if: always() && github.event_name == 'pull_request' # Continue on compile failures
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/measure-firmware-size.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      base_ref:  ${{ github.event.pull_request.base.ref }}
      base_sha:  ${{ github.event.pull_request.base.sha }}
